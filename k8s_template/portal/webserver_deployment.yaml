apiVersion: apps/v1
kind: Deployment
metadata:
  name: webserver
  namespace: fhd-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      serviceAccountName: webserver-sa
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 33
        runAsGroup: 33
        fsGroup: 33
        fsGroupChangePolicy: "OnRootMismatch"
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: webserver
          image: <IMAGE_PLACEHOLDER>
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: webserver-logs
              mountPath: /logs
            - name: apache-logs
              mountPath: /usr/local/apache2/logs
          resources:
            limits:
              cpu: "50m"
              memory: 100Mi
            requests:
              cpu: "50m"
              memory: 100Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
      volumes:
        - name: apache-logs
          emptyDir: {}
        - name: webserver-logs

---
apiVersion: v1
kind: Service
metadata:
  name: webserver
  namespace: fhd-portal
spec:
  type: ClusterIP
  selector:
    app: webserver
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080